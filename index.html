<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jayden Pokémon Birthday 🎉</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(#ff0000, #ffffff);
    overflow: hidden;
  }

  .screen { display: none; padding: 20px; }
  .active { display: block; }

  button {
    padding: 10px 16px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
  }

  #yesBtn { background: #ffcc00; }
  #noBtn {
    position: absolute;
    background: #333;
    color: white;
  }

  .pokemon img {
    width: 90px;
    margin: 10px;
    cursor: pointer;
  }

  .hp-bar {
    width: 220px;
    height: 18px;
    border: 2px solid #000;
    margin: 8px auto;
    background: #ddd;
  }

  .hp-fill {
    height: 100%;
    width: 100%;
    background: green;
  }

  #battleScreen {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    color:white;
    display:none;
    z-index:10;
  }

  #pikachu {
    position: fixed;
    bottom: 20px;
    left: -100px;
    width: 80px;
  }

  #attacks button {
    background: #444;
    color: white;
  }

  canvas {
    position: fixed;
    top:0; left:0;
    pointer-events:none;
  }
</style>
</head>

<body>

<!-- 🎮 CHOOSE POKEMON -->
<div id="chooseScreen" class="screen active">
  <h1>🎮 Choose Your Pokémon</h1>

  <div class="pokemon">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"
         onclick="selectPokemon('Pikachu ⚡', this.src)">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png"
         onclick="selectPokemon('Charmander 🔥', this.src)">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png"
         onclick="selectPokemon('Squirtle 💧', this.src)">
  </div>
</div>

<!-- 🎂 INVITE -->
<div id="inviteScreen" class="screen">
  <h1>🎉 Jayden Rebamonte’s Birthday 🎂</h1>

  <input id="guestName" placeholder="Enter your name">

  <p id="chosen"></p>

  <p>You</p>
  <div class="hp-bar"><div id="youHP" class="hp-fill"></div></div>

  <p>Party</p>
  <div class="hp-bar"><div id="partyHP" class="hp-fill"></div></div>

  <p>Will you join?</p>

  <button id="yesBtn">Yes 🎉</button>
  <button id="noBtn">No 😢</button>
</div>

<!-- ⚔️ BATTLE -->
<div id="battleScreen">
  <h2>⚔️ A Wild Party Appears!</h2>

  <img id="playerPokemon" width="120">

  <div class="hp-bar"><div id="battleHP" class="hp-fill"></div></div>

  <div id="attacks">
    <button onclick="attack('Thunderbolt ⚡')">⚡ Thunderbolt</button>
    <button onclick="attack('Flamethrower 🔥')">🔥 Flamethrower</button>
    <button onclick="attack('Water Gun 💧')">💧 Water Gun</button>
  </div>

  <p id="battleText"></p>
</div>

<!-- ⚡ Pikachu -->
<img id="pikachu" src="https://media.giphy.com/media/3kPDmoWdBpQPNhCnUG/giphy.gif">

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="https://vgmsite.com/soundtracks/pokemon-gameboy-sound-collection/gb/01-opening.mp3">
</audio>

<audio id="battleMusic" loop>
  <source src="https://vgmsite.com/soundtracks/pokemon-gameboy-sound-collection/gb/03-battle.mp3">
</audio>

<audio id="pikachuVoice"><source src="https://www.myinstants.com/media/sounds/pikachu.mp3"></audio>
<audio id="charmanderVoice"><source src="https://www.myinstants.com/media/sounds/charmander.mp3"></audio>
<audio id="squirtleVoice"><source src="https://www.myinstants.com/media/sounds/squirtle.mp3"></audio>

<audio id="yesSound"><source src="https://www.myinstants.com/media/sounds/pokemon-level-up.mp3"></audio>
<audio id="zapSound"><source src="https://www.myinstants.com/media/sounds/thunder.mp3"></audio>

<canvas id="fx"></canvas>

<script>

let chosenName = "";
let chosenImg = "";
let partyHP = 100;

// 🎵 music start
document.body.addEventListener("click", () => {
  document.getElementById("bgMusic").play();
}, { once:true });

// 🎮 select pokemon
function selectPokemon(name, img) {
  chosenName = name;
  chosenImg = img;

  document.getElementById("chosen").innerText = "You chose: " + name;

  if (name.includes("Pikachu")) document.getElementById("pikachuVoice").play();
  if (name.includes("Charmander")) document.getElementById("charmanderVoice").play();
  if (name.includes("Squirtle")) document.getElementById("squirtleVoice").play();

  document.getElementById("chooseScreen").classList.remove("active");
  document.getElementById("inviteScreen").classList.add("active");
}

// 🟡 runaway button
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", move);
noBtn.addEventListener("touchstart", move);

function move(){
  noBtn.style.left = Math.random()*200+"px";
  noBtn.style.top = Math.random()*200+"px";
}

// ❤️ HP update
function updateHP(){
  document.getElementById("partyHP").style.width = partyHP + "%";
  document.getElementById("battleHP").style.width = partyHP + "%";
}

// ⚔️ YES
document.getElementById("yesBtn").addEventListener("click", ()=>{

  const name = document.getElementById("guestName").value || "Guest";

  document.getElementById("bgMusic").pause();
  const battleMusic = document.getElementById("battleMusic");
  battleMusic.play();

  document.getElementById("battleScreen").style.display = "block";
  document.getElementById("playerPokemon").src = chosenImg;

  document.getElementById("yesSound").play();

});

// 🎮 ATTACKS
function attack(move){

  let dmg = Math.floor(Math.random()*15)+10;

  if(chosenName.includes("Pikachu") && move.includes("Thunderbolt")) dmg+=10;
  if(chosenName.includes("Charmander") && move.includes("Flamethrower")) dmg+=10;
  if(chosenName.includes("Squirtle") && move.includes("Water Gun")) dmg+=10;

  partyHP -= dmg;
  if(partyHP < 0) partyHP = 0;

  updateHP();

  document.getElementById("battleText").innerText =
    `${chosenName} used ${move}! -${dmg} HP ⚡`;

  if(partyHP <= 0){
    document.getElementById("battleMusic").pause();

    document.body.innerHTML = `
      <h1>🎉 You’re coming to Jayden’s Birthday!</h1>
      <p>📅 May 3, 2026</p>
      <p>🕓 4:00 PM</p>
      <p>📍 1624 S Juniper St, Chula Vista, CA</p>
      <p>
        <a href="https://www.google.com/maps?q=1624+S+Juniper+St+Chula+Vista+CA+91911" target="_blank">
        Open in Google Maps 📍</a>
      </p>
    `;
  }
}

</script>

</body>
</html>
