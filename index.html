<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calling all Pokémon Trainers to jo join Jayden's Birthday Party</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(135deg, #ffcb05, #3b4cca);
  }

  /* Lightning flash */
  .flash {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
    z-index: 999;
  }

  h1, h2, .card, button, #typeText {
    position: relative;
    z-index: 2;
  }

  h1 {
    margin-top: 40px;
    color: white;
  }

  h2 {
    color: white;
  }

  #typeText {
    color: white;
    font-size: 20px;
    margin-top: 10px;
    min-height: 30px;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    width: 85%;
    max-width: 350px;
    margin: 20px auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    margin: 10px;
    cursor: pointer;
  }

  .yes { background: #4CAF50; color: white; }
  .no { background: #f44336; color: white; position: absolute; }

  /* Floating Pokémon + Ash */
  .character {
    position: absolute;
    width: 80px;
    opacity: 0.85;
    animation: float linear infinite;
    z-index: 0;
  }

  @keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-20vh); }
  }

  /* Pokéball confetti */
  .pokeball {
    position: absolute;
    width: 40px;
    animation: floatBall 6s linear infinite;
    z-index: 1;
  }

  @keyframes floatBall {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
  }

  /* Lightning effect */
  .zap {
    animation: flash 0.2s ease-in-out;
  }

  @keyframes flash {
    0% { background: white; opacity: 1; }
    100% { background: transparent; opacity: 0; }
  }
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<!-- Background Pokémon -->
<img class="character" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" style="left:10%; animation-duration: 10s;">
<img class="character" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" style="left:30%; animation-duration: 12s;">
<img class="character" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" style="left:70%; animation-duration: 11s;">
<img class="character" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" style="left:50%; animation-duration: 13s;">
<img class="character" src="https://archives.bulbagarden.net/media/upload/7/7e/Ash_Journeys.png" style="left:80%; width:100px; animation-duration: 14s;">

<h1>⚡ Pokémon Birthday Party ⚡</h1>

<div id="typeText"></div>

<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" width="120">

<div class="card">
  <p><strong>Trainer:</strong> Jayden Rebamonte</p>
  <p><strong>Date:</strong> Sunday, May 3, 2026</p>
  <p><strong>Time:</strong> 3:00 PM</p>
  <p><strong>Location:</strong> 1476 Judson Way, Chula Vista, CA, 91911</p>
</div>

<h2>Jayden is turning 3. Will you join the birthday adventure party?</h2>

<button class="yes" onclick="sayYes()">Yes!</button>
<button class="no" id="noBtn">No</button>

<!-- Music -->
<audio id="music" loop>
  <source src="https://vgmsite.com/soundtracks/pokemon-gameboy-sound-collection/ftbqzqkq/01%20Opening.mp3">
</audio>

<!-- Sound -->
<audio id="sound" src="https://www.myinstants.com/media/sounds/pokemon-capture.mp3"></audio>

<script>
const noBtn = document.getElementById("noBtn");
const flash = document.getElementById("flash");
const music = document.getElementById("music");

/* Start music on first interaction (browser safe autoplay) */
document.body.addEventListener("click", () => {
  music.play();
}, { once: true });

/* Moving No button */
function moveButton() {
  const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
  const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

/* YES action */
function sayYes() {
  document.getElementById("sound").play();
  launchConfetti();
}

/* Confetti */
function launchConfetti() {
  document.body.innerHTML = `
    <h1 style="color:white;margin-top:100px;">
      🎉 YOU'RE IN! 🎉<br><br>
      Feel free to wear your favorite pokemon outfit and get ready to catch 'em all!
    </h1>
  `;

  for (let i = 0; i < 30; i++) {
    let ball = document.createElement("img");
    ball.src = "https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg";
    ball.className = "pokeball";
    ball.style.left = Math.random() * 100 + "vw";
    ball.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(ball);
  }
}

/* Lightning flashes */
setInterval(() => {
  flash.style.opacity = 1;
  setTimeout(() => flash.style.opacity = 0, 150);
}, 5000);

/* Typing effect */
const text = "A wild invitation appeared...";
let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("typeText").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 80);
  }
}
type();
</script>

</body>
</html>
